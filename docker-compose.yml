services:
  emqx:
    image: emqx/emqx:5.1
    container_name: emqx_broker
    ports:
      - "1883:1883"
      - "8083:8083" 
      - "18083:18083"
    environment:
      - "EMQX_NAME=emqx_local"
    volumes:
      - emqx_data:/opt/emqx/data
    networks:
      - iot_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18083/api/v5/status"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql_db
    # A seção 'ports' abaixo é opcional no Codespaces, mas pode ser mantida
    # para facilitar o acesso direto ao banco, se necessário.
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD_DOCKER}"
      MYSQL_DATABASE: "iot_data"
      MYSQL_USER: "iot_user"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD_DOCKER}"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - iot_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: backend_app
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=iot_user
      - MYSQL_PASSWORD=${MYSQL_PASSWORD_DOCKER}
      - MYSQL_DB=iot_data
      - MQTT_BROKER_URL=mqtt://emqx:1883
    depends_on:
      mysql:
        condition: service_healthy
      emqx:
        condition: service_started
    volumes:
      - ./backend:/usr/src/app
    networks:
      - iot_net
    restart: unless-stopped

  nginx:
    image: nginx:1.25
    container_name: nginx_web
    ports:
      - "8080:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - iot_net
    restart: unless-stopped

# A seção 'ngrok' foi removida.

networks:
  iot_net:
    driver: bridge

volumes:
  emqx_data:
  mysql_data: