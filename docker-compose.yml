services:
  emqx:
    image: emqx/emqx:5.1
    container_name: emqx_broker
    ports:
      - "1883:1883"
      - "8083:8083" 
      - "18083:18083"
    environment:
      - "EMQX_NAME=emqx_local"
    volumes:
      - emqx_data:/opt/emqx/data
    networks:
      - iot_net
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: backend_app
    environment:
      - MQTT_BROKER_URL=mqtt://emqx:1883
    depends_on:
      - emqx
    volumes:
      - ./backend:/usr/src/app
    networks:
      - iot_net
    restart: unless-stopped

  nginx:
    image: nginx:1.25
    container_name: nginx_web
    ports:
      - "8080:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - iot_net
    restart: unless-stopped

networks:
  iot_net:
    driver: bridge

volumes:
  emqx_data:
